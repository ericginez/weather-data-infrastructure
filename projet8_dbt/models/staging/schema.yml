version: 2

models:
  - name: stg_infoclimat_stations
    description: "Métadonnées normalisées des stations météo issues de la source Infoclimat."
    columns:
      - name: station_id
        description: "Identifiant unique de la station dans la source Infoclimat."
        tests:
          - not_null
          - unique
          - accepted_values:
              arguments:
                values: ['00052', '000R5', '07015', 'STATIC0010']

      - name: station_name
        description: "Nom explicite de la station météo."
        tests:
          - not_null

      - name: latitude
        description: "Latitude géographique de la station."
        tests:
          - not_null

      - name: longitude
        description: "Longitude géographique de la station."
        tests:
          - not_null

      - name: elevation
        description: "Altitude de la station, en mètres."
        tests:
          - not_null

      - name: station_type
        description: "Type de station déclaré par la source Infoclimat."
        tests:
          - not_null

      - name: license
        description: "Licence ou conditions d'utilisation associées aux données de la station."
        tests:
          - not_null

  - name: stg_weatherug_stations
    description: "Métadonnées des stations Weather Underground, standardisées pour être compatibles avec le modèle analytique cible."
    columns:
      - name: station_id
        description: "Identifiant unique de la station dans la source Weather Underground."
        tests:
          - not_null
          - unique
          - accepted_values:
              arguments:
                values: ['ILAMAD25', 'IICHTE19']

      - name: station_name
        description: "Nom explicite de la station météo."
        tests:
          - not_null

      - name: latitude
        description: "Latitude géographique de la station."
        tests:
          - not_null

      - name: longitude
        description: "Longitude géographique de la station."
        tests:
          - not_null

      - name: elevation
        description: "Altitude de la station, en mètres."
        tests:
          - not_null

      - name: hardware
        description: "Matériel ou équipement déclaré pour la station."
        tests:
          - not_null

      - name: software
        description: "Logiciel ou système utilisé par la station pour produire les données."
        tests:
          - not_null

  - name: stg_infoclimat_observations
    description: "Observations météorologiques issues d'Infoclimat, converties et normalisées dans des unités communes afin d'être exploitables avec les autres sources."
    columns:
      - name: station_id
        description: "Identifiant de la station météo ayant produit l'observation."
        tests:
          - not_null

      - name: observed_at
        description: "Date et heure de l'observation météo."
        tests:
          - not_null

      - name: temperature
        description: "Température mesurée au moment de l'observation, en degrés Celsius."
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: -50
                max_value: 60

      - name: humidity
        description: "Taux d'humidité relative mesuré au moment de l'observation, en pourcentage."
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 100

      - name: pressure
        description: "Pression atmosphérique mesurée au moment de l'observation, en hPa."
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 850
                max_value: 1100

      - name: wind_speed_avg
        description: "Vitesse moyenne du vent mesurée au moment de l'observation, en km/h."
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 150

      - name: dew_point
        description: "Point de rosée mesuré au moment de l'observation, en degrés Celsius."
        tests:
          - not_null

  - name: stg_weatherug_observations
    description: "Observations météorologiques normalisées issues de Weather Underground, à la granularité d'une station et d'un instant d'observation."
    columns:
      - name: station_id
        description: "Identifiant de la station météo ayant produit l'observation."
        tests:
          - not_null

      - name: observed_at
        description: "Date et heure de l'observation météo."
        tests:
          - not_null

      - name: temperature
        description: "Température mesurée au moment de l'observation, en degrés Celsius."
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: -50
                max_value: 60

      - name: humidity
        description: "Taux d'humidité relative mesuré au moment de l'observation, en pourcentage."
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 100

      - name: pressure
        description: "Pression atmosphérique mesurée au moment de l'observation, en hPa."
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 850
                max_value: 1100

      - name: wind_speed_avg
        description: "Vitesse moyenne du vent mesurée au moment de l'observation, en km/h."
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 150

      - name: dew_point
        description: "Point de rosée mesuré au moment de l'observation, en degrés Celsius."
        tests:
          - not_null